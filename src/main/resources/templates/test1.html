<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>병상 정보 대시보드</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f7fc;
    }

    /* 사이드바 스타일 */
    .sidebar {
      height: 100%;
      width: 250px;
      background-color: #2c3e50;
      position: fixed;
      top: 0;
      left: 0;
      padding-top: 20px;
    }

    .sidebar a {
      padding: 15px;
      text-decoration: none;
      font-size: 18px;
      color: white;
      display: block;
    }

    .sidebar a:hover {
      background-color: #575d63;
    }

    /* 메인 콘텐츠 */
    .main-content {
      margin-left: 250px;
      padding: 20px;
    }

    /* 상단 네비게이션 */
    .navbar {
      background-color: #34495e;
      color: white;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar .logo {
      font-size: 24px;
      font-weight: bold;
    }

    /* 카드 스타일 */
    .card-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .card {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
      flex: 1;
      min-width: 250px;
      text-align: center;
      margin-bottom: 20px;
    }

    .card h3 {
      margin-top: 10px;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 16px;
      color: #7f8c8d;
    }

    .card i {
      font-size: 40px;
      color: #3498db;
    }

    /* 상태 색상 */
    .available {
      color: #27ae60;
    }

    .occupied {
      color: #e74c3c;
    }

    .reserved {
      color: #f39c12;
    }

    /* 하단 footer */
    .footer {
      background-color: #34495e;
      color: white;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>

<!-- 사이드바 -->
<div class="sidebar">
  <a href="#"><i class="fas fa-tachometer-alt"></i> 대시보드</a>
  <a href="#"><i class="fas fa-hospital"></i> 병원 정보</a>
  <a href="#"><i class="fas fa-bed"></i> 병상 정보</a>
  <a href="#"><i class="fas fa-user-md"></i> 의료진 정보</a>
  <a href="#"><i class="fas fa-cogs"></i> 설정</a>
  <a href="#"><i class="fas fa-sign-out-alt"></i> 로그아웃</a>
</div>

<!-- 메인 콘텐츠 -->
<div class="main-content">
  <!-- 상단 네비게이션 -->
  <div class="navbar">
    <div class="logo">병상 대시보드</div>
  </div>

  <!-- 병상 카드 영역 -->
  <div class="card-container">
    <!-- 사용 가능한 병상 -->
    <div class="card available">
      <i class="fas fa-bed"></i>
      <h3>50</h3>
      <p>사용 가능한 병상</p>
    </div>

    <!-- 병상 점유율 -->
    <div class="card occupied">
      <i class="fas fa-bed"></i>
      <h3>120</h3>
      <p>점유된 병상</p>
    </div>

    <!-- 예약된 병상 -->
    <div class="card reserved">
      <i class="fas fa-calendar-check"></i>
      <h3>15</h3>
      <p>예약된 병상</p>
    </div>

    <!-- 병상 총수 -->
    <div class="card">
      <i class="fas fa-hospital"></i>
      <h3>200</h3>
      <p>병상 총수</p>
    </div>
  </div>

  <!-- 병상 상태 및 통계 -->
  <div class="card-container">
    <!-- 입원율 -->
    <div class="card">
      <i class="fas fa-chart-line"></i>
      <h3>85%</h3>
      <p>입원율</p>
    </div>

    <!-- 병원 내 전체 환자 수 -->
    <div class="card">
      <i class="fas fa-users"></i>
      <h3>500</h3>
      <p>전체 환자 수</p>
    </div>

    <!-- 입원 대기 환자 수 -->
    <div class="card">
      <i class="fas fa-user-injured"></i>
      <h3>30</h3>
      <p>입원 대기 환자</p>
    </div>
  </div>
</div>

<!-- 하단 푸터 -->
<div class="footer">
  <p>© 2024 병상 관리 시스템</p>
</div>

</body>
</html>
